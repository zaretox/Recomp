      <rect x={cx-bw/2} y={plotBot-bh} width={bw} height={Math.max(bh,0)} fill={color} rx={3} opacity={0.9}/>

function ChartLine({data,dataKey,color,unit="",height=150}){
  if(!data||data.length<2)return null;

  const vals=data.map(d=>+(d[dataKey]||0));let max=Math.max(...vals),min=Math.min(...vals);const flat=max===min;if(flat){max+=1;min-=1;}const range=max-min;
  const n=data.length,toX=i=>ml+i*plotW/(n-1),toY=v=>plotBot-(v-min)/range*plotH;
  const pts=data.map((d,i)=>`${toX(i)},${toY(+(d[dataKey]||0))}`).join(" ");const step=Math.ceil(n/8);
  return <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height:"auto",display:"block"}}>
    {[0,0.5,1].map((f,i)=>{const y=plotBot-f*plotH;return <line key={i} x1={ml} y1={y} x2={W-mr} y2={y} stroke="#1E2A1E" strokeWidth={1}/>;})}
    <polygon points={`${ml},${plotBot} ${pts} ${toX(n-1)},${plotBot}`} fill={color+"18"}/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
    {data.map((d,i)=><circle key={i} cx={toX(i)} cy={toY(+(d[dataKey]||0))} r={3.5} fill={color}/>)}
    {data.map((d,i)=>(i%step===0||i===n-1)?<text key={"x"+i} x={toX(i)} y={height-8} textAnchor="middle" fontSize={11} fill="#7A8A7A">{_shortDate(d.date)}</text>:null)}
    <text x={ml} y={mt-8} fontSize={11} fill={color} fontWeight="bold">{flat?vals[0]:Math.round(max*10)/10}{unit}</text>
    {!flat&&<text x={W-mr} y={mt-8} textAnchor="end" fontSize={10} fill="#7A8A7A">min {Math.round(min*10)/10}{unit}</text>}
  </svg>;
}

const DEFAULT_PLATES=[25,20,15,10,5,2.5,1.25];
function parseTargetKg(s){if(s==null)return null;const m=String(s).match(/(\d+(?:[.,]\d+)?)/);return m?parseFloat(m[1].replace(",",".")):null;}
function parseDetail(d){const m=String(d||"").match(/(\d+)\s*[×xX]\s*(\d+)/);return m?{sets:+m[1],reps:+m[2]}:null;}
function computePlates(target,bar,plates){plates=plates||DEFAULT_PLATES;if(target==null||isNaN(target))return null;if(target<bar)return {error:true,loadedTotal:bar,perSide:[],remainder:+(target-bar).toFixed(2)};let per=(target-bar)/2,rem=per;const res=[];for(const p of plates){let c=0;while(rem>=p-1e-9){rem-=p;c++;}if(c)res.push({plate:p,count:c});}const loaded=bar+2*(per-rem);return {perSide:res,perSideKg:+(per-rem).toFixed(3),loadedTotal:+loaded.toFixed(2),remainder:+(rem*2).toFixed(3)};}
function prevSessionFor(logs,seance,beforeISO){return logs.filter(l=>l.seance===seance&&l.dateISO<beforeISO).sort((a,b)=>b.dateISO.localeCompare(a.dateISO))[0]||null;}
function bestWeightFor(logs,nom,excludeId){let best=0;logs.forEach(l=>{if(l.id===excludeId)return;l.exercices.forEach(e=>{if(e.nom===nom&&e.weight>best)best=e.weight;});});return best;}

/* ═══ MINUTEUR DE REPOS ═══ */
function RestTimer({color}){
  const[left,setLeft]=useState(0);const[running,setRunning]=useState(false);const[done,setDone]=useState(false);
  const ref=useRef(null);const ac=useRef(null);
  const beep=()=>{try{const A=ac.current;if(A){const o=A.createOscillator(),g=A.createGain();o.connect(g);g.connect(A.destination);o.frequency.value=880;g.gain.setValueAtTime(0.001,A.currentTime);g.gain.exponentialRampToValueAtTime(0.3,A.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+0.55);o.start();o.stop(A.currentTime+0.55);}}catch(e){}try{if(navigator.vibrate)navigator.vibrate([220,90,220]);}catch(e){}};
  useEffect(()=>{if(!running)return;ref.current=setInterval(()=>{setLeft(p=>{if(p<=1){clearInterval(ref.current);setRunning(false);setDone(true);beep();return 0;}return p-1;});},1000);return ()=>clearInterval(ref.current);},[running]);
  const start=s=>{try{if(!ac.current&&(window.AudioContext||window.webkitAudioContext))ac.current=new (window.AudioContext||window.webkitAudioContext)();if(ac.current&&ac.current.resume)ac.current.resume();}catch(e){}setLeft(s);setDone(false);setRunning(true);};
  const pause=()=>setRunning(false);
  const resume=()=>{if(left>0)setRunning(true);};
  const reset=()=>{clearInterval(ref.current);setRunning(false);setLeft(0);setDone(false);};
  const btn={padding:"6px 9px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:800};
  return <Card border={done?color:color+"33"} style={{padding:"10px 12px",...(done?{boxShadow:`0 0 0 2px ${color}`}:{})}}>
    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      <div style={{fontSize:22,fontWeight:800,fontVariantNumeric:"tabular-nums",color:done?color:(running?color:C.text),minWidth:70}}>⏱ {fmtMMSS(left)}</div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",flex:1}}>{[60,90,120,180].map(s=><button key={s} onClick={()=>start(s)} style={{...btn,background:C.surfaceAlt,color:color}}>{s}s</button>)}</div>
      {running&&<button onClick={pause} style={{...btn,background:color,color:"#1A1505"}}>⏸</button>}
      {!running&&left>0&&<button onClick={resume} style={{...btn,background:color,color:"#1A1505"}}>▶</button>}
      {(left>0||done)&&<button onClick={reset} style={{...btn,background:"transparent",color:C.textMut,border:`1px solid ${C.border}`}}>✕</button>}
    </div>
    {done&&<div style={{fontSize:11,color:color,fontWeight:700,marginTop:6}}>Repos terminé — au boulot 💪</div>}
  </Card>;
}

/* ═══ HELPERS LOT 2 (recomposition) ═══ */
function movingAvg7(data){return data.map(pt=>{const end=new Date(pt.dateISO+"T12:00:00");const start=new Date(end);start.setDate(start.getDate()-6);const win=data.filter(p=>{const d=new Date(p.dateISO+"T12:00:00");return d>=start&&d<=end;});return Math.round(win.reduce((a,p)=>a+p.kg,0)/win.length*10)/10;});}
function epley1RM(w,reps){if(!w||!reps||reps<1)return 0;return Math.round(w*(1+reps/30));}
function upsertByDate(arr,entry){return [...arr.filter(x=>x.dateISO!==entry.dateISO),entry].sort((a,b)=>a.dateISO.localeCompare(b.dateISO));}
function groupPhotosByDate(idx){const m={};idx.forEach(p=>{(m[p.dateISO]=m[p.dateISO]||[]).push(p);});return Object.keys(m).sort((a,b)=>b.localeCompare(a)).map(d=>({dateISO:d,date:m[d][0].date,photos:m[d]}));}
const mensuresCfg=[{k:"taille",l:"Tour de taille",emoji:"📏"},{k:"poitrine",l:"Poitrine",emoji:"🫁"},{k:"bras",l:"Bras",emoji:"💪"},{k:"cuisse",l:"Cuisse",emoji:"🦵"},{k:"hanches",l:"Hanches",emoji:"🍑"}];
const photoTypeLabel={face:"Face",profil:"Profil",dos:"Dos"};
function compressImage(file,max,q){max=max||720;q=q||0.6;return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);res(cv.toDataURL("image/jpeg",q));};img.onerror=rej;img.src=r.result;};r.onerror=rej;r.readAsDataURL(file);});}

/* ═══ COURBE POIDS + MOYENNE 7J ═══ */
function WeightTrendChart({data,height}){
  height=height||190;if(!data||data.length<2)return null;
  const W=320,ml=14,mr=16,mt=24,mb=26,plotW=W-ml-mr,plotBot=height-mb,plotH=plotBot-mt;
  const all=data.flatMap(d=>[d.kg,d.avg]);let max=Math.max(...all),min=Math.min(...all);if(max===min){max+=1;min-=1;}const range=max-min;
  const n=data.length,toX=i=>ml+i*plotW/(n-1),toY=v=>plotBot-(v-min)/range*plotH;const step=Math.ceil(n/8);
  const ptsRaw=data.map((d,i)=>`${toX(i)},${toY(d.kg)}`).join(" ");const ptsAvg=data.map((d,i)=>`${toX(i)},${toY(d.avg)}`).join(" ");
  return <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height:"auto",display:"block"}}>
    {[0,0.5,1].map((f,i)=>{const y=plotBot-f*plotH;return <line key={i} x1={ml} y1={y} x2={W-mr} y2={y} stroke="#1E2A1E" strokeWidth={1}/>;})}
    <polyline points={ptsRaw} fill="none" stroke={C.greenLight} strokeWidth={1.5} strokeDasharray="4 3" opacity={0.5}/>
    {data.map((d,i)=><circle key={i} cx={toX(i)} cy={toY(d.kg)} r={2.5} fill={C.greenLight} opacity={0.5}/>)}
    <polyline points={ptsAvg} fill="none" stroke={C.green} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
    {data.map((d,i)=><circle key={"a"+i} cx={toX(i)} cy={toY(d.avg)} r={3.5} fill={C.green}/>)}
    {data.map((d,i)=>(i%step===0||i===n-1)?<text key={"x"+i} x={toX(i)} y={height-8} textAnchor="middle" fontSize={10} fill="#7A8A7A">{(d.date||"").split("/").slice(0,2).join("/")}</text>:null)}
    <text x={ml} y={mt-8} fontSize={11} fill={C.green} fontWeight="bold">{Math.round(max*10)/10}kg</text>
    <text x={W-mr} y={mt-8} textAnchor="end" fontSize={10} fill="#7A8A7A">min {Math.round(min*10)/10}kg</text>
  </svg>;
}

  {nom:"Huile d'olive",cat:"lip",p:0,g:0,l:100,kcal:884},{nom:"Huile de colza",cat:"lip",p:0,g:0,l:100,kcal:884},{nom:"Graines de chia",cat:"lip",p:17,g:42,l:31,kcal:486},{nom:"Noix de cajou",cat:"lip",p:18,g:30,l:44,kcal:553},{nom:"Amandes",cat:"lip",p:21,g:22,l:49,kcal:579},{nom:"Jaunes d'œufs",cat:"lip",p:16,g:3.6,l:27,kcal:322},
];
const catMacro={prot:"p",gluc:"g",lip:"l"};const catLabel={prot:"Protéines",gluc:"Glucides",lip:"Lipides"};
function swapEquivalents(db,foodNom,grams){const src=db.find(f=>f.nom===foodNom);if(!src||!grams||isNaN(grams))return null;const mk=catMacro[src.cat];const target=src[mk]*grams/100;const list=db.filter(f=>f.cat===src.cat&&f.nom!==foodNom&&f[mk]>0).map(f=>{const g=target/f[mk]*100;return {nom:f.nom,grams:Math.round(g),p:Math.round(f.p*g/100),gl:Math.round(f.g*g/100),l:Math.round(f.l*g/100),kcal:Math.round(f.kcal*g/100)};});return {src,mk,target:Math.round(target*10)/10,list};}

/* ═══ SUIVI DOULEUR (blessures) ═══ */
function SuiviDouleur(){

  const doDel=async id=>{const u=logs.filter(l=>l.id!==id);await save("douleur-logs",u);setLogs(u);};

    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{[["log","📝 Saisie"],["history","📋 Historique"],["charts","📈 Suivi"],["subs","🔁 Alternatives"]].map(([k,l])=><Pill key={k} active={mode===k} onClick={()=>setMode(k)} color={C.amber}>{l}</Pill>)}</div>

        <div style={{fontSize:10,color:C.textDim,marginBottom:4}}>Intensité : <b style={{color:intColor(intens)}}>{intens}/10</b></div>

        <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="ex : pic au genou en bas du squat" rows={2} style={{...inputStyle,width:"100%",resize:"vertical",fontFamily:"inherit"}}/>
      </Card>
      <button onClick={doSave} disabled={saving} style={{width:"100%",padding:"11px 0",borderRadius:12,border:"none",cursor:"pointer",background:C.amber,color:"#1A1505",fontSize:13,fontWeight:800,opacity:saving?.6:1}}>{saving?"Enregistrement…":"Enregistrer"}</button>
    </div>}
    {mode==="history"&&<div>{!logs.length?<Card><div style={{textAlign:"center",color:C.textMut,padding:10}}>Aucune douleur enregistrée. 💪</div></Card>:[...logs].sort((a,b)=>b.dateISO.localeCompare(a.dateISO)).map(l=><Card key={l.id}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}><span style={{fontSize:13,fontWeight:700}}>{l.zone}</span><span style={{fontSize:11,fontWeight:800,color:intColor(l.intensite),background:intColor(l.intensite)+"18",borderRadius:6,padding:"2px 7px"}}>{l.intensite}/10</span><span style={{fontSize:11,color:C.textMut}}>{l.date}</span></div><button onClick={()=>doDel(l.id)} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:15}}>✕</button></div>{l.note&&<div style={{fontSize:11,color:C.textMut,marginTop:6,fontStyle:"italic"}}>{l.note}</div>}</Card>)}</div>}
    {mode==="charts"&&<div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:8}}>{painZones.map(z=><button key={z} onClick={()=>setChartZone(z)} style={{padding:"5px 10px",borderRadius:999,border:`2px solid ${chartZone===z?C.amber:"transparent"}`,cursor:"pointer",fontSize:10.5,fontWeight:700,background:chartZone===z?C.amber+"22":C.surfaceAlt,color:chartZone===z?C.amber:C.textMut}}>{z}</button>)}</div>
      <Card>{chartData.length<2?<div style={{color:C.textDim,fontSize:12,padding:16,textAlign:"center"}}>2 entrées minimum pour {chartZone}.</div>:<ChartLine data={chartData} dataKey="v" color={C.amber} unit="/10" height={160}/>}</Card>
    </div>}
    {mode==="subs"&&<div>
      <Card border={C.danger+"33"}><div style={{fontSize:12,fontWeight:700,color:C.danger,marginBottom:6}}>🔁 Alternatives genou / pied</div><div style={{fontSize:11,color:C.textMut,lineHeight:1.5}}>En cas de douleur articulaire : remplace temporairement par une variante moins contraignante, garde une amplitude indolore, et baisse la charge avant d'arrêter.</div></Card>
      {Object.entries(substitutions).map(([nom,alts])=><Card key={nom}><div style={{fontSize:12.5,fontWeight:700,marginBottom:6}}>{nom}</div><div style={{display:"flex",flexWrap:"wrap",gap:5}}>{alts.map((a,i)=><span key={i} style={{fontSize:10.5,background:C.surfaceAlt,border:`1px solid ${C.borderSoft}`,borderRadius:8,padding:"3px 8px",color:C.text}}>{a}</span>)}</div></Card>)}
    </div>}
  </div>;
}

      {repas.map(r=><Card key={r.m}><div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}><div style={{fontSize:14,fontWeight:800}}>{r.m}</div><div style={{fontSize:11,color:C.greenLight,fontWeight:700}}>{r.h}</div></div><div style={{fontSize:10,color:C.textDim,margin:"1px 0 8px"}}>{r.P}P/{r.G}G/{r.L}L · {r.kcal}kcal</div>{r.items.map((it,i)=><div key={i} style={{fontSize:12,color:C.textMut,lineHeight:1.6}}>· {it}</div>)}<MacroBar p={r.P} g={r.G} l={r.L}/>{r.note&&<div style={{marginTop:8,fontSize:11,color:C.textMut,fontStyle:"italic",borderLeft:`2px solid ${C.green}`,paddingLeft:8}}>{r.note}</div>}</Card>)}
    </div>}
    {tab==="aliments"&&<div><FoodSwap/>{Object.entries(alimentsCats).map(([cat,list])=>{const c=cat==="Protéines"?C.prot:cat==="Glucides"?C.gluc:C.lip;return <Card key={cat}><div style={{fontSize:12,fontWeight:700,color:c,marginBottom:8}}>{cat}</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{list.map(a=><span key={a} style={{fontSize:11,color:C.text,background:C.surfaceAlt,border:`1px solid ${C.borderSoft}`,borderRadius:999,padding:"4px 10px"}}>{a}</span>)}</div></Card>;})}<Card border={C.danger+"33"}><div style={{fontSize:12,fontWeight:700,color:C.danger,marginBottom:8}}>🚫 Retirés</div><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{retires.map(a=><span key={a} style={{fontSize:11,color:"#C99",background:"#1A0E0E",borderRadius:999,padding:"4px 10px",textDecoration:"line-through"}}>{a}</span>)}</div></Card></div>}
    {tab==="complements"&&<div>{complements.map(c=><Card key={c.n}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:2}}><span style={{fontSize:18}}>{c.emoji}</span><span style={{fontSize:14,fontWeight:800}}>{c.n}</span></div><div style={{fontSize:11,color:C.greenLight,fontWeight:700,marginBottom:6}}>{c.quand}</div><div style={{fontSize:12,color:C.textMut,lineHeight:1.5}}>{c.d}</div></Card>)}</div>}
    {tab==="suivi"&&<SuiviNutrition/>}
    {tab==="corps"&&<SuiviCorps/>}
    {tab==="conseils"&&<div>{nutritionConseils.map(c=><Card key={c.t} style={{borderLeft:`3px solid ${C.green}`,borderRadius:"0 14px 14px 0"}}><div style={{fontSize:13,fontWeight:700,color:C.greenLight,marginBottom:4}}>💡 {c.t}</div><div style={{fontSize:12,color:C.textMut,lineHeight:1.5}}>{c.d}</div></Card>)}</div>}
  </div>;
}

/* ═══ AJUSTEMENTS SCIENTIFIQUES ═══ */
function ScienceSection(){
  const[sportLogs,setSportLogs]=useState([]);const[nutriLogs,setNutriLogs]=useState([]);
  const[cfg,setCfg]=useState({weightOverrides:{},caloricAdjust:0,deload:false,recovery:false});
  const[loading,setLoading]=useState(true);const[tab,setTab]=useState("bilan");const[applying,setApplying]=useState("");
  useEffect(()=>{Promise.all([load("sport-logs",[]),load("nutri-logs",[]),load("science-config",{weightOverrides:{},caloricAdjust:0,deload:false,recovery:false})]).then(([s,n,c])=>{setSportLogs(s);setNutriLogs(n);setCfg(c);setLoading(false);});},[]);
  const saveCfg=async nc=>{await save("science-config",nc);setCfg(nc);};

  /* ── Analyse surcharge progressive ── */
  const overloadRecs=salleSeances.flatMap(seance=>{
    const sessions=sportLogs.filter(l=>l.seance===seance.id).sort((a,b)=>a.dateISO.localeCompare(b.dateISO)).slice(-4);
    if(sessions.length<2)return[];
    return seance.exercices.flatMap(ex=>{
      const ws=sessions.map(s=>s.exercices.find(e=>e.nom===ex.nom)?.weight||0).filter(w=>w>0);
      if(ws.length<2)return[];
      const last=ws[ws.length-1],prev=ws[ws.length-2];
      const key=seance.id+":"+ex.nom;
      const inc=/squat|leg press|hip thrust|rdl|roumain/i.test(ex.nom)?5:2.5;
      const applied=cfg.weightOverrides[key]===last+inc;
      if(last===prev)return[{seance:seance.id,emoji:seance.couleur,seanceEmoji:seance.emoji,exo:ex.nom,current:last,suggested:last+inc,key,stagnant:true,applied,count:ws.length}];
      if(last>prev)return[{seance:seance.id,emoji:seance.couleur,seanceEmoji:seance.emoji,exo:ex.nom,current:last,previous:prev,key,progressing:true}];
      return[];
    });
  });

  /* ── Tendance poids ── */
  const wEntries=nutriLogs.filter(l=>l.weight).sort((a,b)=>a.dateISO.localeCompare(b.dateISO));
  let weightTrend=null;
  if(wEntries.length>=3){
    const r=wEntries.slice(-5);const days=(new Date(r[r.length-1].dateISO)-new Date(r[0].dateISO))/(86400000)||1;
    const wChange=(r[r.length-1].weight-r[0].weight)/days*7;
    weightTrend={weekly:Math.round(wChange*100)/100,last:r[r.length-1].weight,first:r[0].weight,n:r.length};
  }
  let caloricRec=null;
  if(weightTrend){
    const wc=weightTrend.weekly;
    if(wc<-0.5)caloricRec={delta:+200,reason:`Perte trop rapide (${wc} kg/sem) — risque de LBM`,color:"#F59E0B"};
    else if(wc<-0.4)caloricRec={delta:+150,reason:`Perte légèrement trop rapide (${wc} kg/sem)`,color:"#FBBF24"};
    else if(wc>0.1)caloricRec={delta:-150,reason:`Prise de poids (${wc} kg/sem) — réduire`,color:"#EF4444"};
    else if(wc>-0.05)caloricRec={delta:-100,reason:`Perte trop lente (${wc} kg/sem)`,color:"#F59E0B"};
  }

  /* ── Stats semaine ── */
  const weekISO=new Date(Date.now()-7*86400000).toISOString().slice(0,10);
  const wSport=sportLogs.filter(l=>l.dateISO>=weekISO);
  const wNutri=nutriLogs.filter(l=>l.dateISO>=weekISO);
  const avgComp=wNutri.length?Math.round(wNutri.reduce((a,l)=>a+l.compliance,0)/wNutri.length):null;
  const activeCount=Object.keys(cfg.weightOverrides).length+(cfg.caloricAdjust!==0?1:0)+(cfg.deload?1:0)+(cfg.recovery?1:0);

  if(loading)return <Card><div style={{color:C.textMut,textAlign:"center",padding:20}}>Chargement des données…</div></Card>;
  return <div>
    <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto"}}>{[["bilan","📊 Bilan"],["surcharge","🏋️ Surcharge"],["calories","🥗 Calories"],["config","🔧 Config"]].map(([k,l])=><Pill key={k} active={tab===k} onClick={()=>setTab(k)} color={C.blue}>{l}</Pill>)}</div>

    {tab==="bilan"&&<div>
      {activeCount>0&&<Card border={C.blue+"44"} style={{marginBottom:12,background:"#080E18"}}><div style={{fontSize:12,fontWeight:700,color:C.blueLight,marginBottom:8}}>🔬 Ajustements actifs ({activeCount})</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {Object.entries(cfg.weightOverrides).map(([k,v])=><span key={k} style={{fontSize:10,background:C.blue+"15",border:`1px solid ${C.blue}33`,borderRadius:8,padding:"3px 8px",color:C.blueLight}}>{k.split(":")[1]} → <b>{v}kg</b></span>)}
          {cfg.caloricAdjust!==0&&<span style={{fontSize:10,background:C.green+"15",border:`1px solid ${C.green}33`,borderRadius:8,padding:"3px 8px",color:C.greenLight}}>{cfg.caloricAdjust>0?"+":""}{cfg.caloricAdjust} kcal/jour</span>}
          {cfg.deload&&<span style={{fontSize:10,background:"#818CF815",border:"1px solid #818CF833",borderRadius:8,padding:"3px 8px",color:"#818CF8"}}>Décharge active</span>}
          {cfg.recovery&&<span style={{fontSize:10,background:"#F59E0B15",border:"1px solid #F59E0B33",borderRadius:8,padding:"3px 8px",color:"#FBBF24"}}>Mode récupération</span>}
        </div>
      </Card>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
        <Card><div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.5}}>Séances / 7j</div><div style={{fontSize:22,fontWeight:800,color:wSport.length>=4?C.green:wSport.length>=2?"#F59E0B":C.danger,margin:"4px 0 1px"}}>{wSport.length}<span style={{fontSize:12,color:C.textMut,fontWeight:400}}>/5</span></div><div style={{fontSize:10,color:C.textMut}}>{wSport.length>=4?"✅ Objectif atteint":wSport.length>=2?"🟡 En cours":"🔴 Peu de séances"}</div></Card>
        <Card><div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.5}}>Compliance nutri</div><div style={{fontSize:22,fontWeight:800,color:avgComp===null?C.textMut:avgComp>=85?C.green:avgComp>=65?"#F59E0B":C.danger,margin:"4px 0 1px"}}>{avgComp!==null?avgComp+"%":"—"}</div><div style={{fontSize:10,color:C.textMut}}>{avgComp===null?"Pas de données":avgComp>=85?"✅ Excellente":avgComp>=65?"🟡 Correcte":"🔴 Faible"}</div></Card>
        <Card><div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.5}}>Poids actuel</div><div style={{fontSize:22,fontWeight:800,color:C.amberLight,margin:"4px 0 1px"}}>{weightTrend?weightTrend.last+"kg":"—"}</div><div style={{fontSize:10,color:C.textMut}}>{weightTrend?`Départ : ${weightTrend.first} kg`:"Pas de pesée"}</div></Card>
        <Card><div style={{fontSize:10,color:C.textDim,textTransform:"uppercase",letterSpacing:.5}}>Tendance / sem</div><div style={{fontSize:22,fontWeight:800,color:weightTrend?weightTrend.weekly<-0.05&&weightTrend.weekly>-0.5?C.green:C.danger:C.textMut,margin:"4px 0 1px"}}>{weightTrend?(weightTrend.weekly>0?"+":"")+weightTrend.weekly+" kg":"—"}</div><div style={{fontSize:10,color:C.textMut}}>{weightTrend?"Cible : -0.1 à -0.4 kg/sem":"En attente de pesées"}</div></Card>
      </div>
      {overloadRecs.filter(r=>r.stagnant).length>0&&<Card border="#F59E0B33"><div style={{fontSize:12,fontWeight:700,color:"#FBBF24",marginBottom:8}}>⚠️ {overloadRecs.filter(r=>r.stagnant).length} stagnation(s) détectée(s)</div><div style={{fontSize:11,color:C.textMut}}>Va dans l'onglet 🏋️ Surcharge pour voir les recommandations.</div></Card>}
      {caloricRec&&<Card border={caloricRec.color+"33"}><div style={{fontSize:12,fontWeight:700,color:caloricRec.color,marginBottom:6}}>⚡ Ajustement calorique recommandé</div><div style={{fontSize:11,color:C.textMut}}>Va dans l'onglet 🥗 Calories pour appliquer.</div></Card>}
    </div>}

    {tab==="surcharge"&&<div>
      {overloadRecs.length===0?<Card><div style={{textAlign:"center",color:C.textMut,padding:14,fontSize:12}}>Enregistre au moins 2 séances du même type pour voir les recommandations.</div></Card>:<>
        {overloadRecs.filter(r=>r.stagnant).length>0&&<div style={{fontSize:11,color:C.textMut,marginBottom:10}}>💡 Principe : même charge 2 séances consécutives = signal pour augmenter.</div>}
        {overloadRecs.filter(r=>r.stagnant).map(r=><Card key={r.key} border={r.applied?"#10B98133":"#F59E0B33"}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div><span style={{fontSize:13,fontWeight:800}}>{r.seanceEmoji} {r.seance}</span><span style={{fontSize:11,color:C.textMut,marginLeft:6}}>{r.exo}</span></div>
            {r.applied&&<span style={{fontSize:9,fontWeight:700,color:"#10B981",background:"#10B98115",padding:"2px 7px",borderRadius:99}}>✅ Appliqué</span>}
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:10,color:C.textDim}}>Actuel</div><div style={{fontSize:18,fontWeight:800,color:C.textMut}}>{r.current}<span style={{fontSize:11}}>kg</span></div></div>
            <div style={{fontSize:16,color:C.blue}}>→</div>
            <div style={{textAlign:"center"}}><div style={{fontSize:10,color:C.blue}}>Suggéré</div><div style={{fontSize:18,fontWeight:800,color:C.blue}}>{r.suggested}<span style={{fontSize:11}}>kg</span></div></div>
            <div style={{flex:1}}/>
            <div style={{fontSize:10,color:C.textDim}}>Stagnant<br/>{r.count} séances</div>
          </div>
          {!r.applied?<button disabled={applying===r.key} onClick={async()=>{setApplying(r.key);const nc={...cfg,weightOverrides:{...cfg.weightOverrides,[r.key]:r.suggested}};await saveCfg(nc);setApplying("");}} style={{width:"100%",padding:"9px 0",borderRadius:10,border:"none",cursor:"pointer",background:C.blue,color:"#fff",fontSize:12,fontWeight:700,opacity:applying===r.key?.6:1}}>{applying===r.key?"Application…":"Appliquer +"+((r.suggested-r.current))+"kg →"}</button>
          :<button onClick={async()=>{const ov={...cfg.weightOverrides};delete ov[r.key];await saveCfg({...cfg,weightOverrides:ov});}} style={{width:"100%",padding:"9px 0",borderRadius:10,border:`1px solid ${C.textDim}44`,background:"transparent",color:C.textDim,fontSize:11,cursor:"pointer"}}>Annuler l'ajustement</button>}
        </Card>)}
        {overloadRecs.filter(r=>r.progressing).length>0&&<div style={{marginTop:10}}>
          <div style={{fontSize:11,color:C.textMut,marginBottom:8}}>✅ En progression</div>
          {overloadRecs.filter(r=>r.progressing).map(r=><div key={r.key} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:C.surfaceAlt,border:`1px solid ${C.borderSoft}`,borderRadius:10,padding:"8px 12px",marginBottom:6}}><span style={{fontSize:12}}>{r.seanceEmoji} {r.seance} — {r.exo}</span><span style={{fontSize:11,color:C.green,fontWeight:700}}>{r.previous}→{r.current}kg ✓</span></div>)}
        </div>}
      </>}
    </div>}

    {tab==="calories"&&<div>
      <Card border={C.blue+"33"} style={{marginBottom:10}}>
        <div style={{fontSize:13,fontWeight:800,marginBottom:4}}>Cible actuelle</div>
        <div style={{fontSize:26,fontWeight:800,color:C.amber}}>{macrosTarget.kcal+(cfg.caloricAdjust||0)} <span style={{fontSize:13,color:C.textMut,fontWeight:400}}>kcal/jour</span></div>
        {cfg.caloricAdjust!==0&&<div style={{fontSize:11,color:C.textMut,marginTop:2}}>Base 2 750 kcal {cfg.caloricAdjust>0?"+":""}{cfg.caloricAdjust} kcal (ajustement science)</div>}
      </Card>
      {!weightTrend?<Card><div style={{textAlign:"center",color:C.textMut,padding:14,fontSize:12}}>Enregistre au moins 3 pesées dans le Suivi Nutrition pour générer une recommandation.</div></Card>:<>
        <Card border={caloricRec?caloricRec.color+"44":C.green+"44"}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:8,color:caloricRec?caloricRec.color:C.green}}>
            {caloricRec?"⚠️ Ajustement recommandé":"✅ Rythme optimal"}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:10}}>
            {[["Pesées",weightTrend.n],["Départ",weightTrend.first+"kg"],["Actuel",weightTrend.last+"kg"]].map(([l,v])=><div key={l} style={{textAlign:"center"}}><div style={{fontSize:9,color:C.textDim}}>{l}</div><div style={{fontSize:13,fontWeight:700}}>{v}</div></div>)}
          </div>
          <div style={{textAlign:"center",marginBottom:10}}>
            <div style={{fontSize:10,color:C.textDim}}>Tendance hebdomadaire</div>
            <div style={{fontSize:20,fontWeight:800,color:caloricRec?caloricRec.color:C.green}}>{weightTrend.weekly>0?"+":""}{weightTrend.weekly} kg/sem</div>
            <div style={{fontSize:10,color:C.textMut}}>Cible recomp : -0.10 à -0.40 kg/sem</div>
          </div>
          {caloricRec?<>
            <div style={{background:caloricRec.color+"12",border:`1px solid ${caloricRec.color}33`,borderRadius:8,padding:"8px 10px",marginBottom:10,fontSize:11,color:C.text}}>{caloricRec.reason}</div>

function _isoD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function streakFromDates(isoDates){const set=new Set(isoDates);if(!set.size)return {current:0,best:0};const sorted=[...set].sort();const D=s=>new Date(s+"T12:00:00");let best=1,run=1;for(let i=1;i<sorted.length;i++){const diff=Math.round((D(sorted[i])-D(sorted[i-1]))/86400000);run=diff===1?run+1:1;if(run>best)best=run;}const today=new Date();today.setHours(12,0,0,0);let cursor=new Date(today);if(!set.has(_isoD(cursor))){cursor.setDate(cursor.getDate()-1);if(!set.has(_isoD(cursor)))return {current:0,best};}let cur=0;while(set.has(_isoD(cursor))){cur++;cursor.setDate(cursor.getDate()-1);}return {current:cur,best};}
function weeklyRate(weighIns){const pts=weighIns.slice(-8);if(pts.length<2)return null;const t0=new Date(pts[0].dateISO+"T12:00:00").getTime();const xs=pts.map(p=>(new Date(p.dateISO+"T12:00:00").getTime()-t0)/86400000);const ys=pts.map(p=>p.kg);const n=xs.length,sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0),sxx=xs.reduce((a,b)=>a+b*b,0),sxy=xs.reduce((a,b,i)=>a+b*ys[i],0);const denom=n*sxx-sx*sx;if(denom===0)return null;return Math.round((n*sxy-sx*sy)/denom*7*100)/100;}
function projectETA(current,ratePerWeek,target){if(ratePerWeek==null||ratePerWeek===0)return null;const weeks=(target-current)/ratePerWeek;if(weeks<0)return {reachable:false};const eta=new Date();eta.setDate(eta.getDate()+Math.round(weeks*7));return {reachable:true,weeks:Math.round(weeks*10)/10,eta:_isoD(eta)};}
function fmtDateFR(iso){try{return new Date(iso+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});}catch(e){return iso;}}
const _ip=n=>String(n).padStart(2,"0");
function icsLocal(d){return d.getFullYear()+_ip(d.getMonth()+1)+_ip(d.getDate())+"T"+_ip(d.getHours())+_ip(d.getMinutes())+"00";}
function buildRoutineICS(events){const now=new Date();let s="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//RECOMP//FR\r\nCALSCALE:GREGORIAN\r\n";events.forEach((e,i)=>{const st=new Date(now);st.setHours(e.h,e.m,0,0);const en=new Date(st.getTime()+15*60000);s+="BEGIN:VEVENT\r\nUID:recomp-"+i+"-"+now.getTime()+"@recomp\r\nDTSTAMP:"+icsLocal(now)+"\r\nDTSTART:"+icsLocal(st)+"\r\nDTEND:"+icsLocal(en)+"\r\nRRULE:"+e.rrule+"\r\nSUMMARY:"+e.title+"\r\nBEGIN:VALARM\r\nACTION:DISPLAY\r\nDESCRIPTION:"+e.title+"\r\nTRIGGER:PT0S\r\nEND:VALARM\r\nEND:VEVENT\r\n";});return s+"END:VCALENDAR\r\n";}
const routineEvents=[{title:"Réveil + créatine",h:6,m:45,rrule:"FREQ=DAILY"},{title:"Séance RECOMP",h:7,m:15,rrule:"FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR"},{title:"Shaker whey",h:8,m:20,rrule:"FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR"},{title:"Déjeuner",h:12,m:30,rrule:"FREQ=DAILY"},{title:"Collation",h:16,m:0,rrule:"FREQ=DAILY"},{title:"Dîner",h:19,m:30,rrule:"FREQ=DAILY"}];
const STORAGE_KEYS=["sport-logs","sport-phase","nutri-logs","budget-logs","mensurations","photos-index","douleur-logs","science-config","maison-logs"];
function downloadText(filename,text,mime){try{const blob=new Blob([text],{type:mime||"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1500);}catch(e){console.error(e);}}

/* ═══ PROJECTION ═══ */
function ProjectionCard({weighIns}){
  const[target,setTarget]=useState("");
  const current=weighIns.length?weighIns[weighIns.length-1].kg:null;const rate=weeklyRate(weighIns);const tg=parseFloat(target);
  const eta=(current!=null&&rate!=null&&!isNaN(tg))?projectETA(current,rate,tg):null;
  return <Card border={C.blue+"33"}>
    <div style={{fontSize:13,fontWeight:800,marginBottom:8}}>🔮 Projection « et si »</div>
    {weighIns.length<2?<div style={{fontSize:11,color:C.textDim}}>Enregistre au moins 2 pesées (Nutrition → Suivi) pour estimer ta tendance.</div>:<div>
      <div style={{fontSize:11,color:C.textMut,marginBottom:10}}>Tendance : <b style={{color:rate<0?C.green:rate>0?C.gluc:C.textMut}}>{rate>0?"+":""}{rate} kg/sem</b> · poids actuel {current} kg</div>

      {eta&&(eta.reachable?<div style={{fontSize:12,color:C.text,background:C.blue+"12",border:`1px solid ${C.blue}33`,borderRadius:10,padding:"10px 12px"}}>À ce rythme : <b style={{color:C.blueLight}}>{tg} kg</b> vers le <b style={{color:C.blueLight}}>{fmtDateFR(eta.eta)}</b> <span style={{color:C.textMut}}>(~{eta.weeks} sem.)</span></div>:<div style={{fontSize:11,color:C.gluc,background:C.gluc+"12",borderRadius:10,padding:"10px 12px"}}>Ta tendance ne va pas vers cette cible — ajuste le déficit ou le surplus.</div>)}
      <div style={{fontSize:9.5,color:C.textDim,marginTop:8,fontStyle:"italic"}}>Estimation linéaire sur tes dernières pesées : un cap, pas une promesse.</div>
    </div>}
  </Card>;
}

      <button onClick={()=>downloadText("recomp-routine.ics",buildRoutineICS(routineEvents),"text/calendar")} style={{width:"100%",marginTop:12,padding:"10px 0",borderRadius:10,border:`1px solid ${C.amber}55`,background:C.amber+"15",color:C.amber,fontSize:12,fontWeight:700,cursor:"pointer"}}>📅 Ajouter les rappels au calendrier</button>
      <div style={{fontSize:9.5,color:C.textDim,marginTop:6}}>Télécharge un fichier .ics : ouvre-le pour ajouter réveil, séance et repas (récurrents) à ton calendrier iPhone.</div>
    </Card>
    <ProjectionCard weighIns={weighIns}/>
    <DataCard/>
  </div>;
}

/* ═══ APP ═══ */
function App(){
  const[section,setSection]=useState("home");
  const hdr={home:{c:C.amber,i:"💪",l:"ACCUEIL"},sport:{c:C.amber,i:"🏋️",l:"PROGRAMME SPORT"},nutrition:{c:C.green,i:"🥗",l:"PROGRAMME NUTRITION"},budget:{c:C.budget,i:"💰",l:"BUDGET COURSES"},review:{c:C.blue,i:"🔬",l:"AJUSTEMENTS SCIENTIFIQUES"}};
  return <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:"'Inter', system-ui, sans-serif",display:"flex",flexDirection:"column",paddingTop:"env(safe-area-inset-top, 0px)"}}>
    {section!=="home"&&<div style={{padding:"16px 16px 0",display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg, ${hdr[section].c}22, ${hdr[section].c}44)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>{hdr[section].i}</div>
      <div><div style={{fontSize:20,fontWeight:800,letterSpacing:-.5}}>RECOMP</div><div style={{fontSize:11,color:C.textMut,letterSpacing:1}}>{hdr[section].l}</div></div>
    </div>}
    <div style={{flex:1,padding:"14px 14px 90px",overflowY:"auto"}}>
      {section==="home"&&<HomeScreen goTo={setSection}/>}
      {section==="sport"&&<SportSection/>}
      {section==="nutrition"&&<NutritionSection/>}
      {section==="budget"&&<BudgetSection/>}
      {section==="review"&&<ScienceSection/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:`${C.bg}F2`,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"center",padding:"0 0 env(safe-area-inset-bottom, 8px)"}}>
      {[["home","🏠","Accueil",C.text],["sport","🏋️","Sport",C.amber],["nutrition","🥗","Nutri",C.green],["budget","💰","Budget",C.budget],["review","🔬","Science",C.blue]].map(([id,icon,label,color])=><button key={id} onClick={()=>setSection(id)} style={{flex:1,maxWidth:90,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"10px 0 8px",border:"none",cursor:"pointer",background:"transparent",position:"relative"}}>
        {section===id&&<div style={{position:"absolute",top:-1,width:40,height:3,borderRadius:"0 0 4px 4px",background:color,boxShadow:`0 0 12px ${color}88`}}/>}
        <span style={{fontSize:20,filter:section===id?"none":"grayscale(1) opacity(0.4)"}}>{icon}</span>
        <span style={{fontSize:9,fontWeight:700,letterSpacing:.5,color:section===id?color:C.textDim}}>{label}</span>
      </button>)}
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
