/* ═══ SVG CHARTS NATIFS (échelle uniforme) ═══ */
const _shortDate=s=>(s||"").split("/").slice(0,2).join("/");
function ChartBar({data,dataKey,color,unit="",height=160}){
  if(!data||!data.length)return null;
  const W=320,ml=12,mr=14,mt=24,mb=26,plotW=W-ml-mr,plotBot=height-mb,plotH=plotBot-mt;
  const vals=data.map(d=>+(d[dataKey]||0));const max=Math.max(...vals,1)*1.15;
  const n=data.length,slot=plotW/n,bw=Math.min(slot*0.6,70);const step=Math.ceil(n/8);
  return <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height:"auto",display:"block"}}>
    {[0,0.25,0.5,0.75,1].map((f,i)=>{const y=plotBot-f*plotH;return <line key={i} x1={ml} y1={y} x2={W-mr} y2={y} stroke="#1E2A1E" strokeWidth={1}/>;})}
    {data.map((d,i)=>{const v=+(d[dataKey]||0);const bh=v/max*plotH;const cx=ml+slot*i+slot/2;return <g key={i}>
      <rect x={cx-bw/2} y={plotBot-bh} width={bw} height={Math.max(bh,0)} fill={color} rx={3} opacity={0.9}/>
      <text x={cx} y={plotBot-bh-6} textAnchor="middle" fontSize={12} fill={color} fontWeight="bold">{v}{unit}</text>
      {(i%step===0||i===n-1)&&<text x={cx} y={height-8} textAnchor="middle" fontSize={11} fill="#7A8A7A">{_shortDate(d.date)}</text>}
    </g>;})}
  </svg>;
}
function ChartLine({data,dataKey,color,unit="",height=150}){
  if(!data||data.length<2)return null;
  const W=320,ml=14,mr=16,mt=24,mb=26,plotW=W-ml-mr,plotBot=height-mb,plotH=plotBot-mt;
  const vals=data.map(d=>+(d[dataKey]||0));let max=Math.max(...vals),min=Math.min(...vals);const flat=max===min;if(flat){max+=1;min-=1;}const range=max-min;
  const n=data.length,toX=i=>ml+i*plotW/(n-1),toY=v=>plotBot-(v-min)/range*plotH;
  const pts=data.map((d,i)=>`${toX(i)},${toY(+(d[dataKey]||0))}`).join(" ");const step=Math.ceil(n/8);
  return <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height:"auto",display:"block"}}>
    {[0,0.5,1].map((f,i)=>{const y=plotBot-f*plotH;return <line key={i} x1={ml} y1={y} x2={W-mr} y2={y} stroke="#1E2A1E" strokeWidth={1}/>;})}
    <polygon points={`${ml},${plotBot} ${pts} ${toX(n-1)},${plotBot}`} fill={color+"18"}/>
    <polyline points={pts} fill="none" stroke={color} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
    {data.map((d,i)=><circle key={i} cx={toX(i)} cy={toY(+(d[dataKey]||0))} r={3.5} fill={color}/>)}
    {data.map((d,i)=>(i%step===0||i===n-1)?<text key={"x"+i} x={toX(i)} y={height-8} textAnchor="middle" fontSize={11} fill="#7A8A7A">{_shortDate(d.date)}</text>:null)}
    <text x={ml} y={mt-8} fontSize={11} fill={color} fontWeight="bold">{flat?vals[0]:Math.round(max*10)/10}{unit}</text>
    {!flat&&<text x={W-mr} y={mt-8} textAnchor="end" fontSize={10} fill="#7A8A7A">min {Math.round(min*10)/10}{unit}</text>}
  </svg>;
}

/* ═══ DATE HELPERS ═══ */
const isoToday=()=>new Date().toISOString().slice(0,10);
const shiftISO=(iso,d)=>{const x=new Date(iso+"T12:00:00");x.setDate(x.getDate()+d);return x.toISOString().slice(0,10);};
const fmtDateLong=iso=>new Date(iso+"T12:00:00").toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
const fmtDateShort=iso=>new Date(iso+"T12:00:00").toLocaleDateString("fr-FR");
function DateNav({value,onChange,color}){
  const today=isoToday();const isToday=value===today;const future=value>=today;
  const navBtn={width:38,height:38,borderRadius:10,border:`1px solid ${color}44`,background:color+"15",color:color,fontSize:15,fontWeight:800,cursor:"pointer",flexShrink:0};
  return <Card style={{marginBottom:10,padding:"10px 12px"}} border={color+"33"}>
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <button onClick={()=>onChange(shiftISO(value,-1))} style={navBtn}>◀</button>
      <div style={{flex:1,textAlign:"center"}}>
        <div style={{fontSize:14,fontWeight:800,textTransform:"capitalize"}}>{fmtDateLong(value)}</div>
        <div style={{fontSize:10,color:isToday?color:C.textDim,fontWeight:isToday?700:400}}>{isToday?"Aujourd'hui":new Date(value+"T12:00:00").toLocaleDateString("fr-FR",{year:"numeric"})}</div>
      </div>
      <button onClick={()=>!future&&onChange(shiftISO(value,1))} disabled={future} style={{...navBtn,opacity:future?.3:1,cursor:future?"default":"pointer"}}>▶</button>
    </div>
    <div style={{display:"flex",gap:8,marginTop:8,alignItems:"center"}}>
      <input type="date" value={value} max={today} onChange={e=>e.target.value&&onChange(e.target.value)} style={{...inputStyle,fontSize:12,padding:"7px 9px",colorScheme:"dark",flex:1}}/>
      {!isToday&&<button onClick={()=>onChange(today)} style={{padding:"7px 13px",borderRadius:8,border:`1px solid ${color}44`,background:color+"15",color:color,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>Aujourd'hui</button>}
    </div>
  </Card>;
}

const DEFAULT_PLATES=[25,20,15,10,5,2.5,1.25];
function parseTargetKg(s){if(s==null)return null;const m=String(s).match(/(\d+(?:[.,]\d+)?)/);return m?parseFloat(m[1].replace(",",".")):null;}
function parseDetail(d){const m=String(d||"").match(/(\d+)\s*[×xX]\s*(\d+)/);return m?{sets:+m[1],reps:+m[2]}:null;}
function computePlates(target,bar,plates){plates=plates||DEFAULT_PLATES;if(target==null||isNaN(target))return null;if(target<bar)return {error:true,loadedTotal:bar,perSide:[],remainder:+(target-bar).toFixed(2)};let per=(target-bar)/2,rem=per;const res=[];for(const p of plates){let c=0;while(rem>=p-1e-9){rem-=p;c++;}if(c)res.push({plate:p,count:c});}const loaded=bar+2*(per-rem);return {perSide:res,perSideKg:+(per-rem).toFixed(3),loadedTotal:+loaded.toFixed(2),remainder:+(rem*2).toFixed(3)};}
function prevSessionFor(logs,seance,beforeISO){return logs.filter(l=>l.seance===seance&&l.dateISO<beforeISO).sort((a,b)=>b.dateISO.localeCompare(a.dateISO))[0]||null;}
function bestWeightFor(logs,nom,excludeId){let best=0;logs.forEach(l=>{if(l.id===excludeId)return;l.exercices.forEach(e=>{if(e.nom===nom&&e.weight>best)best=e.weight;});});return best;}
function fmtMMSS(s){const m=Math.floor(s/60),r=s%60;return m+":"+String(r).padStart(2,"0");}

/* ═══ MINUTEUR DE REPOS ═══ */
function RestTimer({color}){
  const[left,setLeft]=useState(0);const[running,setRunning]=useState(false);const[done,setDone]=useState(false);
  const ref=useRef(null);const ac=useRef(null);
  const beep=()=>{try{const A=ac.current;if(A){const o=A.createOscillator(),g=A.createGain();o.connect(g);g.connect(A.destination);o.frequency.value=880;g.gain.setValueAtTime(0.001,A.currentTime);g.gain.exponentialRampToValueAtTime(0.3,A.currentTime+0.02);g.gain.exponentialRampToValueAtTime(0.001,A.currentTime+0.55);o.start();o.stop(A.currentTime+0.55);}}catch(e){}try{if(navigator.vibrate)navigator.vibrate([220,90,220]);}catch(e){}};
  useEffect(()=>{if(!running)return;ref.current=setInterval(()=>{setLeft(p=>{if(p<=1){clearInterval(ref.current);setRunning(false);setDone(true);beep();return 0;}return p-1;});},1000);return ()=>clearInterval(ref.current);},[running]);
  const start=s=>{try{if(!ac.current&&(window.AudioContext||window.webkitAudioContext))ac.current=new (window.AudioContext||window.webkitAudioContext)();if(ac.current&&ac.current.resume)ac.current.resume();}catch(e){}setLeft(s);setDone(false);setRunning(true);};
  const pause=()=>setRunning(false);
  const resume=()=>{if(left>0)setRunning(true);};
  const reset=()=>{clearInterval(ref.current);setRunning(false);setLeft(0);setDone(false);};
  const btn={padding:"6px 9px",borderRadius:8,border:"none",cursor:"pointer",fontSize:11,fontWeight:800};
  return <Card border={done?color:color+"33"} style={{padding:"10px 12px",...(done?{boxShadow:`0 0 0 2px ${color}`}:{})}}>
    <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
      <div style={{fontSize:22,fontWeight:800,fontVariantNumeric:"tabular-nums",color:done?color:(running?color:C.text),minWidth:70}}>⏱ {fmtMMSS(left)}</div>
      <div style={{display:"flex",gap:5,flexWrap:"wrap",flex:1}}>{[60,90,120,180].map(s=><button key={s} onClick={()=>start(s)} style={{...btn,background:C.surfaceAlt,color:color}}>{s}s</button>)}</div>
      {running&&<button onClick={pause} style={{...btn,background:color,color:"#1A1505"}}>⏸</button>}
      {!running&&left>0&&<button onClick={resume} style={{...btn,background:color,color:"#1A1505"}}>▶</button>}
      {(left>0||done)&&<button onClick={reset} style={{...btn,background:"transparent",color:C.textMut,border:`1px solid ${C.border}`}}>✕</button>}
    </div>
    {done&&<div style={{fontSize:11,color:color,fontWeight:700,marginTop:6}}>Repos terminé — au boulot 💪</div>}
  </Card>;
}

function PlateCalc({color}){

function avgRPE(exs){const v=exs.filter(e=>e.rpe>0).map(e=>e.rpe);return v.length?Math.round(v.reduce((a,b)=>a+b,0)/v.length*10)/10:null;}

function deloadAdvice(logs){
  if(!logs||!logs.length)return {level:"none",canAssess:false,reasons:[],info:"Pas encore de séances enregistrées."};
  const asc=[...logs].sort((a,b)=>a.dateISO.localeCompare(b.dateISO));
  const nonD=asc.filter(l=>!l.deload);
  if(nonD.length<4)return {level:"none",canAssess:false,reasons:[],info:"Enregistre au moins 4 séances (hors décharge) pour activer l'analyse."};
  const flags=[];const today=new Date();
  const lastDeload=[...asc].reverse().find(l=>l.deload);
  const refDate=lastDeload?new Date(lastDeload.dateISO+"T12:00:00"):new Date(asc[0].dateISO+"T12:00:00");
  const weeksSince=Math.round((today-refDate)/(7*86400000)*10)/10;
  if(weeksSince>=6)flags.push("≈ "+Math.round(weeksSince)+" sem. sans décharge");
  const recent=nonD.slice(-3);
  const sessRPE=recent.map(l=>{const v=(l.exercices||[]).filter(e=>e.rpe>0).map(e=>e.rpe);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}).filter(x=>x!=null);
  const recentRPE=sessRPE.length?Math.round(sessRPE.reduce((a,b)=>a+b,0)/sessRPE.length*10)/10:null;
  if(recentRPE!=null&&recentRPE>=9)flags.push("RPE moyen "+recentRPE+"/10 (très élevé)");
  const vol=l=>(l.exercices||[]).reduce((a,e)=>a+(e.weight||0)*(e.reps||0)*(e.sets||0),0);
  const bySeance={};nonD.forEach(l=>{(bySeance[l.seance]=bySeance[l.seance]||[]).push(l);});
  let regress=0,assessed=0;
  Object.values(bySeance).forEach(arr=>{if(arr.length>=2){assessed++;const last=vol(arr[arr.length-1]),prev=vol(arr[arr.length-2]);if(last>0&&prev>0&&last<prev*0.97)regress++;}});
  if(assessed>=2&&regress>=2)flags.push("volume en baisse sur "+regress+" types de séance");
  let level=flags.length>=2?"deload":flags.length===1?"watch":"ok";
  if(weeksSince>=8)level="deload";
  return {level,canAssess:true,reasons:flags,weeksSince,recentRPE};
}

/* ═══ HELPERS LOT 2 (recomposition) ═══ */
function movingAvg7(data){return data.map(pt=>{const end=new Date(pt.dateISO+"T12:00:00");const start=new Date(end);start.setDate(start.getDate()-6);const win=data.filter(p=>{const d=new Date(p.dateISO+"T12:00:00");return d>=start&&d<=end;});return Math.round(win.reduce((a,p)=>a+p.kg,0)/win.length*10)/10;});}
function epley1RM(w,reps){if(!w||!reps||reps<1)return 0;return Math.round(w*(1+reps/30));}
function upsertByDate(arr,entry){return [...arr.filter(x=>x.dateISO!==entry.dateISO),entry].sort((a,b)=>a.dateISO.localeCompare(b.dateISO));}
function groupPhotosByDate(idx){const m={};idx.forEach(p=>{(m[p.dateISO]=m[p.dateISO]||[]).push(p);});return Object.keys(m).sort((a,b)=>b.localeCompare(a)).map(d=>({dateISO:d,date:m[d][0].date,photos:m[d]}));}
const mensuresCfg=[{k:"taille",l:"Tour de taille",emoji:"📏"},{k:"cou",l:"Tour de cou",emoji:"🧣"},{k:"poitrine",l:"Poitrine",emoji:"🫁"},{k:"bras",l:"Bras",emoji:"💪"},{k:"cuisse",l:"Cuisse",emoji:"🦵"},{k:"hanches",l:"Hanches",emoji:"🍑"}];
const photoTypeLabel={face:"Face",profil:"Profil",dos:"Dos"};
function compressImage(file,max,q){max=max||720;q=q||0.6;return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);res(cv.toDataURL("image/jpeg",q));};img.onerror=rej;img.src=r.result;};r.onerror=rej;r.readAsDataURL(file);});}

/* ═══ COURBE POIDS + MOYENNE 7J ═══ */
function WeightTrendChart({data,height}){
  height=height||190;if(!data||data.length<2)return null;
  const W=320,ml=14,mr=16,mt=24,mb=26,plotW=W-ml-mr,plotBot=height-mb,plotH=plotBot-mt;
  const all=data.flatMap(d=>[d.kg,d.avg]);let max=Math.max(...all),min=Math.min(...all);if(max===min){max+=1;min-=1;}const range=max-min;
  const n=data.length,toX=i=>ml+i*plotW/(n-1),toY=v=>plotBot-(v-min)/range*plotH;const step=Math.ceil(n/8);
  const ptsRaw=data.map((d,i)=>`${toX(i)},${toY(d.kg)}`).join(" ");const ptsAvg=data.map((d,i)=>`${toX(i)},${toY(d.avg)}`).join(" ");
  return <svg viewBox={`0 0 ${W} ${height}`} style={{width:"100%",height:"auto",display:"block"}}>
    {[0,0.5,1].map((f,i)=>{const y=plotBot-f*plotH;return <line key={i} x1={ml} y1={y} x2={W-mr} y2={y} stroke="#1E2A1E" strokeWidth={1}/>;})}
    <polyline points={ptsRaw} fill="none" stroke={C.greenLight} strokeWidth={1.5} strokeDasharray="4 3" opacity={0.5}/>
    {data.map((d,i)=><circle key={i} cx={toX(i)} cy={toY(d.kg)} r={2.5} fill={C.greenLight} opacity={0.5}/>)}
    <polyline points={ptsAvg} fill="none" stroke={C.green} strokeWidth={2.5} strokeLinejoin="round" strokeLinecap="round"/>
    {data.map((d,i)=><circle key={"a"+i} cx={toX(i)} cy={toY(d.avg)} r={3.5} fill={C.green}/>)}
    {data.map((d,i)=>(i%step===0||i===n-1)?<text key={"x"+i} x={toX(i)} y={height-8} textAnchor="middle" fontSize={10} fill="#7A8A7A">{(d.date||"").split("/").slice(0,2).join("/")}</text>:null)}
    <text x={ml} y={mt-8} fontSize={11} fill={C.green} fontWeight="bold">{Math.round(max*10)/10}kg</text>
    <text x={W-mr} y={mt-8} textAnchor="end" fontSize={10} fill="#7A8A7A">min {Math.round(min*10)/10}kg</text>
  </svg>;
}

/* ═══ SUIVI CORPS (mensurations + photos) ═══ */
function navyBF(waist,neck,height){if(!waist||!neck||!height||waist<=neck)return null;const bf=495/(1.0324-0.19077*Math.log10(waist-neck)+0.15456*Math.log10(height))-450;return Math.round(Math.max(2,Math.min(60,bf))*10)/10;}
function leanFat(weight,bf){if(!weight||bf==null)return null;const fat=Math.round(weight*bf/100*10)/10;return {fat,lean:Math.round((weight-fat)*10)/10};}
function closestWeight(weighIns,dateISO){if(!weighIns||!weighIns.length)return null;const t=new Date(dateISO+"T12:00:00").getTime();let best=null,bd=Infinity;weighIns.forEach(x=>{const d=Math.abs(new Date(x.dateISO+"T12:00:00").getTime()-t);if(d<bd){bd=d;best=x;}});return best?best.kg:null;}

const foodDB=[
  {nom:"Blancs d'œufs",cat:"prot",p:11,g:0.7,l:0.2,kcal:52},{nom:"Poulet/dinde",cat:"prot",p:31,g:0,l:3.6,kcal:165},{nom:"Cabillaud/thon",cat:"prot",p:24,g:0,l:1,kcal:110},{nom:"Fromage blanc 0%",cat:"prot",p:8,g:4,l:0.2,kcal:50},{nom:"Whey (poudre)",cat:"prot",p:80,g:8,l:6,kcal:390},{nom:"Lentilles cuites",cat:"prot",p:9,g:20,l:0.4,kcal:116},
  {nom:"Avoine",cat:"gluc",p:13,g:60,l:7,kcal:370},{nom:"Patate douce",cat:"gluc",p:1.6,g:20,l:0.1,kcal:86},{nom:"Quinoa cuit",cat:"gluc",p:4.4,g:21,l:1.9,kcal:120},{nom:"Riz cuit",cat:"gluc",p:2.7,g:28,l:0.3,kcal:130},{nom:"Haricots rouges cuits",cat:"gluc",p:9,g:22,l:0.5,kcal:127},{nom:"Banane",cat:"gluc",p:1.1,g:23,l:0.3,kcal:89},
  {nom:"Huile d'olive",cat:"lip",p:0,g:0,l:100,kcal:884},{nom:"Huile de colza",cat:"lip",p:0,g:0,l:100,kcal:884},{nom:"Graines de chia",cat:"lip",p:17,g:42,l:31,kcal:486},{nom:"Noix de cajou",cat:"lip",p:18,g:30,l:44,kcal:553},{nom:"Amandes",cat:"lip",p:21,g:22,l:49,kcal:579},{nom:"Jaunes d'œufs",cat:"lip",p:16,g:3.6,l:27,kcal:322},
];
const catMacro={prot:"p",gluc:"g",lip:"l"};const catLabel={prot:"Protéines",gluc:"Glucides",lip:"Lipides"};
function swapEquivalents(db,foodNom,grams){const src=db.find(f=>f.nom===foodNom);if(!src||!grams||isNaN(grams))return null;const mk=catMacro[src.cat];const target=src[mk]*grams/100;const list=db.filter(f=>f.cat===src.cat&&f.nom!==foodNom&&f[mk]>0).map(f=>{const g=target/f[mk]*100;return {nom:f.nom,grams:Math.round(g),p:Math.round(f.p*g/100),gl:Math.round(f.g*g/100),l:Math.round(f.l*g/100),kcal:Math.round(f.kcal*g/100)};});return {src,mk,target:Math.round(target*10)/10,list};}

/* ═══ ÉQUIVALENCES ALIMENTAIRES ═══ */
function FoodSwap(){
  const[open,setOpen]=useState(false);const[food,setFood]=useState(foodDB[0].nom);const[grams,setGrams]=useState("100");
  const gNum=parseFloat(grams);const r=swapEquivalents(foodDB,food,gNum);
  return <Card border={C.green+"33"}>
    <button onClick={()=>setOpen(v=>!v)} style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",background:"none",border:"none",cursor:"pointer",color:C.green,fontSize:13,fontWeight:800,padding:0}}><span>🔄 Équivalences (mêmes macros)</span><span>{open?"▲":"▼"}</span></button>
    {open&&<div style={{marginTop:10}}>
      <div style={{display:"flex",gap:8,marginBottom:10}}>
        <div style={{flex:2}}><div style={{fontSize:10,color:C.textDim,marginBottom:3}}>Aliment</div><select value={food} onChange={e=>setFood(e.target.value)} style={{...inputStyle,fontSize:13}}>{["prot","gluc","lip"].map(cat=><optgroup key={cat} label={catLabel[cat]}>{foodDB.filter(f=>f.cat===cat).map(f=><option key={f.nom} value={f.nom}>{f.nom}</option>)}</optgroup>)}</select></div>
        <div style={{width:90}}><div style={{fontSize:10,color:C.textDim,marginBottom:3}}>Quantité (g)</div><input type="number" inputMode="numeric" value={grams} onChange={e=>setGrams(e.target.value)} style={inputStyle} placeholder="100"/></div>
      </div>
      {r?<><div style={{fontSize:10,color:C.textMut,marginBottom:8}}>{gNum}g de {r.src.nom} ≈ <b style={{color:C.greenLight}}>{r.target}g de {catLabel[r.src.cat].toLowerCase()}</b> · {Math.round(r.src.p*gNum/100)}P/{Math.round(r.src.g*gNum/100)}G/{Math.round(r.src.l*gNum/100)}L</div>
      {r.list.map((x,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderTop:`1px solid ${C.borderSoft}`}}><div><div style={{fontSize:12.5,fontWeight:700}}>{x.nom}</div><div style={{fontSize:9.5,color:C.textDim}}>{x.p}P · {x.gl}G · {x.l}L · {x.kcal}kcal</div></div><div style={{fontSize:15,fontWeight:800,color:C.greenLight}}>{x.grams}<span style={{fontSize:10,color:C.textMut}}>g</span></div></div>)}
      <div style={{fontSize:9.5,color:C.textDim,marginTop:8,fontStyle:"italic"}}>Valeurs ~/100g approximatives, équivalence sur le macro dominant.</div></>:<div style={{fontSize:11,color:C.textDim}}>Entre une quantité.</div>}
    </div>}
  </Card>;
}

/* ═══ SUIVI NUTRITION ═══ */
function SuiviNutrition(){
  const[logs,setLogs]=useState([]);const[loading,setLoading]=useState(true);const[mode,setMode]=useState("log");const[meals,setMeals]=useState({});const[weight,setWeight]=useState("");const[saving,setSaving]=useState(false);const[selDate,setSelDate]=useState(isoToday());
  const[supps,setSupps]=useState({});const[water,setWater]=useState(0);const[sleep,setSleep]=useState("");const[stress,setStress]=useState(5);
  useEffect(()=>{load("nutri-logs",[]).then(d=>{setLogs(d);setLoading(false)});},[]);
  useEffect(()=>{const ex=logs.find(l=>l.dateISO===selDate);setMeals(ex?{...ex.meals}:{});setWeight(ex&&ex.weight!=null?String(ex.weight):"");setSupps(ex?{...(ex.supps||{})}:{});setWater(ex?.water||0);setSleep(ex&&ex.sleep!=null?String(ex.sleep):"");setStress(ex&&ex.stress!=null?ex.stress:5);},[selDate,logs]);
  const selLabel=fmtDateShort(selDate);
  const toggle=id=>setMeals(p=>({...p,[id]:!p[id]}));
  const doSave=async()=>{setSaving(true);const ok=mealIds.filter(id=>meals[id]).length;const e={id:Date.now(),date:selLabel,dateISO:selDate,meals:{...meals},mealsOk:ok,mealsTotal:mealIds.length,compliance:Math.round(ok/mealIds.length*100),weight:parseFloat(weight)||null,supps:{...supps},water,sleep:parseFloat(sleep)||null,stress};const u=[...logs.filter(l=>l.dateISO!==selDate),e];await save("nutri-logs",u);setLogs(u);setSaving(false);setMode("history");};
  const doDel=async id=>{const u=logs.filter(l=>l.id!==id);await save("nutri-logs",u);setLogs(u);};
  const doReset=async()=>{await save("nutri-logs",[]);setLogs([]);};
  const weightData=logs.filter(l=>l.weight).sort((a,b)=>a.dateISO.localeCompare(b.dateISO)).map(l=>({date:l.date,dateISO:l.dateISO,kg:l.weight}));
  const wAvg=movingAvg7(weightData);const weightTrend=weightData.map((d,i)=>({...d,avg:wAvg[i]}));
  const compData=[...logs].sort((a,b)=>a.dateISO.localeCompare(b.dateISO)).slice(-30).map(l=>({date:l.date,pct:l.compliance}));
  const sleepData=logs.filter(l=>l.sleep!=null).sort((a,b)=>a.dateISO.localeCompare(b.dateISO)).map(l=>({date:l.date,h:l.sleep}));
  const stressData=logs.filter(l=>l.stress!=null).sort((a,b)=>a.dateISO.localeCompare(b.dateISO)).map(l=>({date:l.date,s:l.stress}));
  const last7=logs.filter(l=>{const d=new Date(l.dateISO);const a=new Date();a.setDate(a.getDate()-7);return d>=a;});
  const avgC=last7.length?Math.round(last7.reduce((a,l)=>a+l.compliance,0)/last7.length):0;
  const latW=weightData.length?weightData[weightData.length-1].kg:null;const fstW=weightData.length?weightData[0].kg:null;const diffW=latW&&fstW?(latW-fstW).toFixed(1):null;
  if(loading)return <div style={{color:C.textMut,padding:20}}>Chargement…</div>;
  return <div>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{[["log","📝 Saisie"],["history","📋 Historique"],["charts","📈 Graphiques"]].map(([k,l])=><Pill key={k} active={mode===k} onClick={()=>setMode(k)} color={C.green}>{l}</Pill>)}</div>
    {mode==="log"&&<div>
      <DateNav value={selDate} onChange={setSelDate} color={C.green}/>
      <Card><div style={{fontSize:14,fontWeight:800,marginBottom:2}}>📋 Repas du jour</div><div style={{fontSize:11,color:C.textMut,marginBottom:12}}>{selLabel}</div>
        {mealIds.map(id=><div key={id} onClick={()=>toggle(id)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",cursor:"pointer",borderTop:`1px solid ${C.borderSoft}`}}><div style={{width:26,height:26,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",border:`2px solid ${meals[id]?C.green:C.borderSoft}`,background:meals[id]?C.green+"22":"transparent",fontSize:13}}>{meals[id]?"✓":""}</div><span style={{fontSize:15}}>{mealIcons[id]}</span><div style={{flex:1}}><div style={{fontSize:12.5,fontWeight:meals[id]?700:400,color:meals[id]?C.text:C.textMut}}>{mealLabels[id]}</div><div style={{fontSize:10,color:C.textDim}}>{mealTimes[id]}</div></div></div>)}
        <div style={{fontSize:11,color:C.greenLight,fontWeight:700,marginTop:6}}>{mealIds.filter(id=>meals[id]).length}/{mealIds.length}</div>
      </Card>

      <Card><div style={{fontSize:14,fontWeight:800,marginBottom:2}}>💊 Compléments</div><div style={{fontSize:11,color:C.textMut,marginBottom:4}}>Pris aujourd'hui</div>

        <div style={{borderTop:`1px solid ${C.borderSoft}`,paddingTop:12,marginBottom:14}}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,fontSize:12.5,fontWeight:700}}>😴 Sommeil</div><input type="number" step="0.5" value={sleep} onChange={e=>setSleep(e.target.value)} placeholder="7.5" style={{...inputStyle,width:90,textAlign:"right"}}/><span style={{fontSize:11,color:C.textMut,width:16}}>h</span></div></div>

/* ═══ PLAN RM (1RM + progression) ═══ */
function round25(x){return Math.round(x/2.5)*2.5;}
function weightForReps(oneRM,reps){return round25(oneRM/(1+reps/30));}
function repsAtPct(pct){return Math.max(1,Math.round((100/pct-1)*30));}
function pctWeight(oneRM,pct){return round25(oneRM*pct/100);}
function progressionPlan(current,goal,weeks,reps){if(!current||!weeks||weeks<1)return [];const p=[];for(let w=1;w<=weeks;w++){const proj=current+(goal-current)*w/weeks;p.push({week:w,proj:Math.round(proj),weight:weightForReps(proj,reps)});}return p;}
function currentRMFor(logs,nom){const s=(logs||[]).filter(l=>!l.deload&&(l.exercices||[]).some(e=>e.nom===nom)).sort((a,b)=>a.dateISO.localeCompare(b.dateISO));const rms=s.map(l=>{const e=l.exercices.find(x=>x.nom===nom);return e?epley1RM(e.weight,e.reps):0;}).filter(x=>x>0);if(!rms.length)return null;const current=Math.max(...rms.slice(-3));const earlier=rms.length>3?Math.max(...rms.slice(0,-3)):null;const trend=earlier!=null?(current>earlier?"up":current<earlier?"down":"flat"):null;return {rm:current,trend,n:rms.length};}

function PlanRM(){
  const[logs,setLogs]=useState([]);const[loading,setLoading]=useState(true);const[mode,setMode]=useState("rm");
  const[sel,setSel]=useState("");const[manual,setManual]=useState("");const[goal,setGoal]=useState("");const[weeks,setWeeks]=useState("8");const[reps,setReps]=useState("8");
  useEffect(()=>{load("sport-logs",[]).then(d=>{setLogs(d||[]);setLoading(false);});},[]);
  const A=C.amber;
  const allExos=[...new Set(salleSeances.flatMap(s=>s.exercices.map(e=>e.nom)))];
  const rmList=allExos.map(nom=>{const r=currentRMFor(logs,nom);return r?{nom,...r}:null;}).filter(Boolean).sort((a,b)=>b.rm-a.rm);
  const effSel=sel||(rmList[0]&&rmList[0].nom)||allExos[0];
  const selRM=currentRMFor(logs,effSel);
  const tableRM=parseFloat(manual)||(selRM?selRM.rm:0);
  const pcts=[100,95,90,85,80,75,70,65,60];
  const current=selRM?selRM.rm:0;
  const suggested=current?round25(current*1.05):0;
  const goalN=parseFloat(goal)||suggested;
  const wk=Math.max(1,Math.min(16,parseInt(weeks)||8));
  const rp=Math.max(1,Math.min(15,parseInt(reps)||8));
  const plan=current?progressionPlan(current,goalN,wk,rp):[];
  if(loading)return <div style={{color:C.textMut,padding:20}}>Chargement…</div>;
  return <div>
    <div style={{display:"flex",gap:6,marginBottom:14,flexWrap:"wrap"}}>{[["rm","💪 Mes 1RM"],["table","📊 % de 1RM"],["plan","📈 Plan"]].map(([k,l])=><Pill key={k} active={mode===k} onClick={()=>setMode(k)} color={A}>{l}</Pill>)}</div>
    {mode==="rm"&&<div>
      <div style={{fontSize:11,color:C.textMut,marginBottom:10}}>1RM estimé (formule Epley) d'après tes meilleures séries récentes. Plus tu enregistres de séances (charge + reps), plus c'est précis.</div>
      {!rmList.length?<Card><div style={{textAlign:"center",color:C.textMut,padding:12}}>Aucune donnée. Enregistre des séances dans Suivi → 🏋️ Salle (charge + reps).</div></Card>:rmList.map(x=><Card key={x.nom} style={{padding:"12px 14px"}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{x.nom}</div><div style={{fontSize:10,color:C.textDim}}>{x.n} séance{x.n>1?"s":""} enregistrée{x.n>1?"s":""}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:18,fontWeight:800,color:A}}>{x.rm} <span style={{fontSize:11,color:C.textMut}}>kg</span></div>{x.trend&&<div style={{fontSize:10,fontWeight:700,color:x.trend==="up"?C.green:x.trend==="down"?C.danger:C.textMut}}>{x.trend==="up"?"↑ en progrès":x.trend==="down"?"↓ en baisse":"= stable"}</div>}</div></div></Card>)}
    </div>}
    {mode==="table"&&<div>
      <Card><div style={{fontSize:10,color:C.textDim,marginBottom:5}}>Exercice</div><select value={effSel} onChange={e=>{setSel(e.target.value);setManual("");}} style={{...inputStyle,fontSize:13,marginBottom:10}}>{allExos.map(n=><option key={n} value={n}>{n}</option>)}</select>
        <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{flex:1,fontSize:11,color:C.textMut}}>1RM de référence</div><input type="number" value={manual} onChange={e=>setManual(e.target.value)} placeholder={selRM?String(selRM.rm):"—"} style={{...inputStyle,width:90,textAlign:"right"}}/><span style={{fontSize:11,color:C.textMut}}>kg</span></div>
        <div style={{fontSize:9.5,color:C.textDim,marginTop:4}}>{selRM?"Estimé depuis tes séances : "+selRM.rm+" kg. Modifie si tu connais ton vrai 1RM.":"Pas de données pour cet exercice — entre ton 1RM à la main."}</div>

      :<Card><div style={{textAlign:"center",color:C.textMut,padding:12}}>Enregistre au moins une séance avec cet exercice (charge + reps) pour générer un plan.</div></Card>}
    </div>}
  </div>;
}

/* ═══ COACH (volume/muscle · auto-progression · gate maison→salle) ═══ */
const muscleLandmarks={Pecs:{mev:10,mav:22},Dos:{mev:10,mav:22},"Épaules":{mev:8,mav:22},Biceps:{mev:6,mav:16},Triceps:{mev:6,mav:16},Quadriceps:{mev:8,mav:20},Ischios:{mev:8,mav:18},Fessiers:{mev:6,mav:18},Mollets:{mev:8,mav:16}};
const muscleMap={"DC haltères":"Pecs","DC haltères neutre":"Pecs","DI haltères":"Pecs","Poulie basse (pecs)":"Pecs","Tirage vertical":"Dos","Tirage bûcheron":"Dos","Rack pull":"Dos","Élévations lat.":"Épaules","Écarté inversé poulie":"Épaules","Tirage araignée":"Épaules","DM haltères":"Épaules","Triceps poulie":"Triceps","Ext. triceps":"Triceps","Curl biceps":"Biceps","Curl marteau":"Biceps","Presse à cuisses":"Quadriceps","Hack squat":"Quadriceps","Presse lourde":"Quadriceps","Leg extension":"Quadriceps","RDL":"Ischios","Leg curl":"Ischios","Leg curl assis":"Ischios","Hip thrust":"Fessiers","Abduction hanche":"Fessiers","Mollets debout":"Mollets","Mollets assis":"Mollets"};
const muscleOrder=["Pecs","Dos","Épaules","Biceps","Triceps","Quadriceps","Ischios","Fessiers","Mollets"];
function weeklyMuscleVolume(logs,days){const c=new Date();c.setDate(c.getDate()-(days||7));const r=(logs||[]).filter(l=>!l.deload&&new Date(l.dateISO+"T12:00:00")>=c);const v={};r.forEach(l=>(l.exercices||[]).forEach(e=>{const m=muscleMap[e.nom];if(m&&e.sets>0&&e.weight>0)v[m]=(v[m]||0)+e.sets;}));return v;}
function parseRepRange(detail){const d=String(detail||"");if(/\ds\s*$/.test(d.trim())||/\d\s*s\b/.test(d))return null;const m=d.match(/(\d+)\s*[×xX]\s*(\d+)(?:\s*[-–]\s*(\d+))?/);if(!m)return null;return {sets:+m[1],lo:+m[2],hi:m[3]?+m[3]:+m[2]};}
function nextSuggestions(logs){const nonD=(logs||[]).filter(l=>!l.deload).sort((a,b)=>a.dateISO.localeCompare(b.dateISO));if(!nonD.length)return null;const last=nonD[nonD.length-1];const seance=salleSeances.find(s=>s.id===last.seance);if(!seance)return null;const sugg=(last.exercices||[]).filter(e=>e.weight>0).map(e=>{const prog=seance.exercices.find(x=>x.nom===e.nom);const rr=prog?parseRepRange(prog.detail):null;const muscle=muscleMap[e.nom];const inc=(muscle==="Quadriceps"||muscle==="Ischios"||muscle==="Fessiers")?5:2.5;let action,txt;if(!rr){action="keep";txt="garde "+e.weight+" kg";}else if(e.reps>=rr.hi&&(e.rpe===0||e.rpe<=8)){action="up";txt="+"+inc+" kg → "+(e.weight+inc)+" kg";}else if(e.rpe>=9.5||e.reps<rr.lo){action="hold";txt="reste à "+e.weight+" kg (consolide)";}else{action="reps";txt="garde "+e.weight+" kg, +1 rep (vise "+rr.hi+")";}return {nom:e.nom,action,txt,last:e.reps+"×"+e.weight+"kg"+(e.rpe?" @RPE"+e.rpe:"")};});return {seance:last.seance,emoji:seance.emoji,date:last.date,sugg};}
function maisonGate(maisonLogs,douleurLogs){const sessions=(maisonLogs||[]).length;let weeks=0;if(sessions){const ds=maisonLogs.map(l=>new Date(l.dateISO+"T12:00:00").getTime());weeks=Math.round((Math.max(...ds)-Math.min(...ds))/(7*86400000)*10)/10;}const c=new Date();c.setDate(c.getDate()-21);const rp=(douleurLogs||[]).filter(l=>new Date(l.dateISO+"T12:00:00")>=c&&(l.zone==="Genou droit"||l.zone==="Pied droit"));const maxPain=rp.length?Math.max(...rp.map(l=>l.intensite||0)):0;const sharp=rp.some(l=>/piqu|pic|aigu|élanc/i.test(l.note||""));const checks=[{ok:weeks>=6||sessions>=18,label:"≥ 6 semaines de renfort à la maison",val:sessions?(weeks>=1?weeks+" sem · "+sessions+" séances":sessions+" séances"):"aucune séance maison enregistrée"},{ok:maxPain<=3&&!sharp,label:"Genou + pied calmes (≤ 3/10, sans douleur piquante)",val:rp.length?("max "+maxPain+"/10"+(sharp?" · piquante ⚠️":"")):"aucune douleur enregistrée (21 j)"}];return {ready:checks.every(x=>x.ok),checks,hasPainData:rp.length>0};}

function CoachSport(){
  const[sLogs,setSLogs]=useState([]);const[mLogs,setMLogs]=useState([]);const[dLogs,setDLogs]=useState([]);const[loading,setLoading]=useState(true);
  useEffect(()=>{Promise.all([load("sport-logs",[]),load("maison-logs",[]),load("douleur-logs",[])]).then(([s,m,d])=>{setSLogs(s||[]);setMLogs(m||[]);setDLogs(d||[]);setLoading(false);});},[]);
  const A=C.amber;const vol=weeklyMuscleVolume(sLogs,7);const sugg=nextSuggestions(sLogs);const gate=maisonGate(mLogs,dLogs);
  if(loading)return <div style={{color:C.textMut,padding:20}}>Chargement…</div>;
  const actionCfg={up:{c:C.green,e:"⬆️"},reps:{c:A,e:"🔁"},hold:{c:C.gluc,e:"⏸️"},keep:{c:C.textMut,e:"✓"}};
  return <div>

      {gate.checks.map((c,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,padding:"6px 0",borderTop:i>0?`1px solid ${C.borderSoft}`:"none"}}><span style={{fontSize:14}}>{c.ok?"✅":"⬜"}</span><div style={{flex:1}}><div style={{fontSize:11.5,fontWeight:600,color:c.ok?C.text:C.textMut}}>{c.label}</div><div style={{fontSize:10,color:C.textDim}}>{c.val}</div></div></div>)}
      {!gate.hasPainData&&<div style={{fontSize:9.5,color:C.textDim,marginTop:8}}>💡 Note tes douleurs genou/pied (onglet 🩹 Douleur) pour fiabiliser ce critère.</div>}
    </Card>
    <div style={{fontSize:12,fontWeight:800,margin:"18px 0 8px"}}>💪 Volume par muscle <span style={{fontSize:10,color:C.textDim,fontWeight:400}}>· 7 j (séries travaillées)</span></div>
    {Object.keys(vol).length===0?<Card><div style={{textAlign:"center",color:C.textMut,padding:12,fontSize:12}}>Aucune série salle sur 7 jours.</div></Card>
     :muscleOrder.map(m=>{const sets=vol[m]||0;if(sets===0)return null;const lm=muscleLandmarks[m];const st=sets<lm.mev?{c:C.gluc,t:"sous le min."}:sets<=lm.mav?{c:C.green,t:"zone optimale"}:{c:C.danger,t:"au-dessus du max"};const scale=Math.max(lm.mav*1.2,sets);const mevP=lm.mev/scale*100,mavP=lm.mav/scale*100,setP=sets/scale*100;return <Card key={m} style={{padding:"10px 12px"}}><div style={{display:"flex",alignItems:"center",marginBottom:6}}><span style={{flex:1,fontSize:12,fontWeight:700}}>{m}</span><span style={{fontSize:13,fontWeight:800,color:st.c}}>{sets} <span style={{fontSize:9,color:C.textDim,fontWeight:400}}>séries</span></span></div><div style={{position:"relative",height:8,borderRadius:4,background:C.surfaceAlt}}><div style={{position:"absolute",left:mevP+"%",top:-2,bottom:-2,width:1.5,background:C.textMut}}/><div style={{position:"absolute",left:mavP+"%",top:-2,bottom:-2,width:1.5,background:C.danger}}/><div style={{height:"100%",width:Math.min(100,setP)+"%",background:st.c,borderRadius:4}}/></div><div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:9,color:C.textDim}}><span style={{color:st.c,fontWeight:700}}>{st.t}</span><span>zone {lm.mev}–{lm.mav}</span></div></Card>;})}
    <div style={{fontSize:9.5,color:C.textDim,padding:"2px 4px 0",lineHeight:1.5}}>MEV (min. efficace, trait gris) → MAV (max. utile, trait rouge) par semaine. Vise la zone.</div>
    <div style={{fontSize:12,fontWeight:800,margin:"18px 0 8px"}}>🎯 Prochaine séance <span style={{fontSize:10,color:C.textDim,fontWeight:400}}>{sugg?"· "+sugg.emoji+" "+sugg.seance+" (d'après le "+sugg.date+")":""}</span></div>
    {!sugg?<Card><div style={{textAlign:"center",color:C.textMut,padding:12,fontSize:12}}>Enregistre une séance salle pour des suggestions de progression.</div></Card>
     :<Card>{sugg.sugg.map((s,i)=>{const cf=actionCfg[s.action];return <div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 0",borderTop:i>0?`1px solid ${C.borderSoft}`:"none"}}><span style={{fontSize:15}}>{cf.e}</span><div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:700}}>{s.nom}</div><div style={{fontSize:9.5,color:C.textDim}}>dernier : {s.last}</div></div><div style={{fontSize:11,fontWeight:700,color:cf.c,textAlign:"right"}}>{s.txt}</div></div>;})}</Card>}
    <div style={{fontSize:9.5,color:C.textDim,padding:"2px 4px 0",lineHeight:1.5}}>Double progression : tu montes la charge quand tu atteins le haut de la fourchette à RPE ≤ 8. Sinon tu consolides.</div>
  </div>;
}

function bmrMifflin(kg,cm,age,sex){if(!kg||!cm||!age)return null;return Math.round(10*kg+6.25*cm-5*age+(sex==="F"?-161:5));}
function calorieTarget(kg,cm,age,sex,activity,deficitPct){const bmr=bmrMifflin(kg,cm,age,sex);if(bmr==null)return null;const tdee=Math.round(bmr*activity);const t=Math.round(tdee*(1-deficitPct/100));const target=Math.max(t,bmr);return {bmr,tdee,target,clamped:target!==t};}
function macrosFor(targetKcal,proteinG){const pKcal=proteinG*4;const fatKcal=Math.round(targetKcal*0.25);const fatG=Math.round(fatKcal/9);const carbG=Math.max(0,Math.round((targetKcal-pKcal-fatKcal)/4));return {p:proteinG,l:fatG,g:carbG};}
function proteinTarget(kg,lean){return lean>0?Math.round(2.2*lean):Math.round(1.8*kg);}
function avgRecent(weighIns,n){const w=[...weighIns].sort((a,b)=>b.dateISO.localeCompare(a.dateISO)).slice(0,n).map(x=>x.kg);return w.length?Math.round(w.reduce((a,b)=>a+b,0)/w.length*10)/10:null;}
function scaleQty(text,f){if(!f||f===1)return text;return String(text).replace(/^(\d+)(\s?)(g|ml)\b/,(m,n,sp,u)=>{const v=+n;if(v<40)return m;return Math.round(v*f/5)*5+sp+u;});}
const activityOpts=[{l:"Sédentaire",v:1.2},{l:"Léger",v:1.375},{l:"Modéré",v:1.55},{l:"Élevé",v:1.725}];
const objectifOpts=[{l:"Sèche −20%",v:20},{l:"Perte −15%",v:15},{l:"Modéré −10%",v:10},{l:"Maintien",v:0},{l:"Prise +10%",v:-10}];

function ymOf(iso){return String(iso||"").slice(0,7);}
function prevYm(ym){const[y,m]=ym.split("-").map(Number);const d=new Date(y,m-1,1);d.setMonth(d.getMonth()-1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function nextYm(ym){const[y,m]=ym.split("-").map(Number);const d=new Date(y,m-1,1);d.setMonth(d.getMonth()+1);return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
function ymLabel(ym){const[y,m]=ym.split("-");return ["janv.","févr.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."][+m-1]+" "+y;}
function sumMonth(entries,ym){return Math.round(entries.filter(e=>ymOf(e.dateISO)===ym).reduce((a,e)=>a+(+e.montant||0),0)*100)/100;}
function catBreakdown(expenses,ym){const m={};expenses.filter(e=>ymOf(e.dateISO)===ym).forEach(e=>{m[e.cat]=(m[e.cat]||0)+(+e.montant||0);});return m;}
function savingsRate(income,exp){if(income<=0)return null;return Math.round((income-exp)/income*1000)/10;}
function pctChange(cur,prev){if(prev<=0)return null;return Math.round((cur-prev)/prev*1000)/10;}
function topCat(bd){let k=null,v=-1;for(const c in bd){if(bd[c]>v){v=bd[c];k=c;}}return k?{cat:k,montant:Math.round(v*100)/100}:null;}

function ScienceSection(){
  const[sportLogs,setSportLogs]=useState([]);const[nutriLogs,setNutriLogs]=useState([]);
  const[cfg,setCfg]=useState({weightOverrides:{},caloricAdjust:0,deload:false,recovery:false});
  const[loading,setLoading]=useState(true);const[tab,setTab]=useState("bilan");const[applying,setApplying]=useState("");
  useEffect(()=>{Promise.all([load("sport-logs",[]),load("nutri-logs",[]),load("science-config",{weightOverrides:{},caloricAdjust:0,deload:false,recovery:false})]).then(([s,n,c])=>{setSportLogs(s);setNutriLogs(n);setCfg(c);setLoading(false);});},[]);
  const saveCfg=async nc=>{await save("science-config",nc);setCfg(nc);};

  /* ── Analyse surcharge progressive ── */
  const overloadRecs=salleSeances.flatMap(seance=>{
    const sessions=sportLogs.filter(l=>l.seance===seance.id).sort((a,b)=>a.dateISO.localeCompare(b.dateISO)).slice(-4);
    if(sessions.length<2)return[];
    return seance.exercices.flatMap(ex=>{
      const ws=sessions.map(s=>s.exercices.find(e=>e.nom===ex.nom)?.weight||0).filter(w=>w>0);
      if(ws.length<2)return[];
      const last=ws[ws.length-1],prev=ws[ws.length-2];
      const key=seance.id+":"+ex.nom;
      const inc=/squat|leg press|hip thrust|rdl|roumain/i.test(ex.nom)?5:2.5;
      const applied=cfg.weightOverrides[key]===last+inc;

function _isoD(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function streakFromDates(isoDates){const set=new Set(isoDates);if(!set.size)return {current:0,best:0};const sorted=[...set].sort();const D=s=>new Date(s+"T12:00:00");let best=1,run=1;for(let i=1;i<sorted.length;i++){const diff=Math.round((D(sorted[i])-D(sorted[i-1]))/86400000);run=diff===1?run+1:1;if(run>best)best=run;}const today=new Date();today.setHours(12,0,0,0);let cursor=new Date(today);if(!set.has(_isoD(cursor))){cursor.setDate(cursor.getDate()-1);if(!set.has(_isoD(cursor)))return {current:0,best};}let cur=0;while(set.has(_isoD(cursor))){cur++;cursor.setDate(cursor.getDate()-1);}return {current:cur,best};}
function weeklyRate(weighIns){const pts=weighIns.slice(-8);if(pts.length<2)return null;const t0=new Date(pts[0].dateISO+"T12:00:00").getTime();const xs=pts.map(p=>(new Date(p.dateISO+"T12:00:00").getTime()-t0)/86400000);const ys=pts.map(p=>p.kg);const n=xs.length,sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0),sxx=xs.reduce((a,b)=>a+b*b,0),sxy=xs.reduce((a,b,i)=>a+b*ys[i],0);const denom=n*sxx-sx*sx;if(denom===0)return null;return Math.round((n*sxy-sx*sy)/denom*7*100)/100;}
function projectETA(current,ratePerWeek,target){if(ratePerWeek==null||ratePerWeek===0)return null;const weeks=(target-current)/ratePerWeek;if(weeks<0)return {reachable:false};const eta=new Date();eta.setDate(eta.getDate()+Math.round(weeks*7));return {reachable:true,weeks:Math.round(weeks*10)/10,eta:_isoD(eta)};}
function fmtDateFR(iso){try{return new Date(iso+"T12:00:00").toLocaleDateString("fr-FR",{day:"2-digit",month:"long",year:"numeric"});}catch(e){return iso;}}
const _ip=n=>String(n).padStart(2,"0");
function icsLocal(d){return d.getFullYear()+_ip(d.getMonth()+1)+_ip(d.getDate())+"T"+_ip(d.getHours())+_ip(d.getMinutes())+"00";}
function buildRoutineICS(events){const now=new Date();let s="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//RECOMP//FR\r\nCALSCALE:GREGORIAN\r\n";events.forEach((e,i)=>{const st=new Date(now);st.setHours(e.h,e.m,0,0);const en=new Date(st.getTime()+15*60000);s+="BEGIN:VEVENT\r\nUID:recomp-"+i+"-"+now.getTime()+"@recomp\r\nDTSTAMP:"+icsLocal(now)+"\r\nDTSTART:"+icsLocal(st)+"\r\nDTEND:"+icsLocal(en)+"\r\nRRULE:"+e.rrule+"\r\nSUMMARY:"+e.title+"\r\nBEGIN:VALARM\r\nACTION:DISPLAY\r\nDESCRIPTION:"+e.title+"\r\nTRIGGER:PT0S\r\nEND:VALARM\r\nEND:VEVENT\r\n";});return s+"END:VCALENDAR\r\n";}
const routineEvents=[{title:"Réveil + créatine",h:6,m:45,rrule:"FREQ=DAILY"},{title:"Séance RECOMP",h:7,m:15,rrule:"FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR"},{title:"Shaker whey",h:8,m:20,rrule:"FREQ=WEEKLY;BYDAY=MO,TU,WE,TH,FR"},{title:"Déjeuner",h:12,m:30,rrule:"FREQ=DAILY"},{title:"Collation",h:16,m:0,rrule:"FREQ=DAILY"},{title:"Dîner",h:19,m:30,rrule:"FREQ=DAILY"}];
const STORAGE_KEYS=["sport-logs","sport-phase","nutri-logs","budget-logs","mensurations","photos-index","douleur-logs","science-config","maison-logs","fin-income","fin-expenses","fin-caps","fin-goal","taille-corps","nutri-cal-cfg"];
function downloadText(filename,text,mime){try{const blob=new Blob([text],{type:mime||"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(()=>URL.revokeObjectURL(url),1500);}catch(e){console.error(e);}}

/* ═══ PROJECTION ═══ */
function ProjectionCard({weighIns}){
  const[target,setTarget]=useState("");
  const current=weighIns.length?weighIns[weighIns.length-1].kg:null;const rate=weeklyRate(weighIns);const tg=parseFloat(target);
  const eta=(current!=null&&rate!=null&&!isNaN(tg))?projectETA(current,rate,tg):null;
  return <Card border={C.blue+"33"}>
    <div style={{fontSize:13,fontWeight:800,marginBottom:8}}>🔮 Projection « et si »</div>
    {weighIns.length<2?<div style={{fontSize:11,color:C.textDim}}>Enregistre au moins 2 pesées (Nutrition → Suivi) pour estimer ta tendance.</div>:<div>
      <div style={{fontSize:11,color:C.textMut,marginBottom:10}}>Tendance : <b style={{color:rate<0?C.green:rate>0?C.gluc:C.textMut}}>{rate>0?"+":""}{rate} kg/sem</b> · poids actuel {current} kg</div>
      <div style={{marginBottom:10}}><div style={{fontSize:10,color:C.textDim,marginBottom:3}}>Poids cible (kg)</div><input type="number" step="0.5" inputMode="decimal" value={target} onChange={e=>setTarget(e.target.value)} style={inputStyle} placeholder="123"/></div>
      {eta&&(eta.reachable?<div style={{fontSize:12,color:C.text,background:C.blue+"12",border:`1px solid ${C.blue}33`,borderRadius:10,padding:"10px 12px"}}>À ce rythme : <b style={{color:C.blueLight}}>{tg} kg</b> vers le <b style={{color:C.blueLight}}>{fmtDateFR(eta.eta)}</b> <span style={{color:C.textMut}}>(~{eta.weeks} sem.)</span></div>:<div style={{fontSize:11,color:C.gluc,background:C.gluc+"12",borderRadius:10,padding:"10px 12px"}}>Ta tendance ne va pas vers cette cible — ajuste le déficit ou le surplus.</div>)}
      <div style={{fontSize:9.5,color:C.textDim,marginTop:8,fontStyle:"italic"}}>Estimation linéaire sur tes dernières pesées : un cap, pas une promesse.</div>
    </div>}
  </Card>;
}

/* ═══ SAUVEGARDE DONNÉES ═══ */
function DataCard(){
  const[msg,setMsg]=useState("");const[busy,setBusy]=useState(false);
  const doExport=async()=>{setBusy(true);try{let keys=[];try{const l=await window.storage.list();keys=(l&&l.keys)||[];}catch(e){keys=[];}if(!keys.length)keys=STORAGE_KEYS;const data={};for(const k of keys){try{const r=await window.storage.get(k);if(r&&r.value!=null)data[k]=r.value;}catch(e){}}const out=JSON.stringify({app:"RECOMP",exportedAt:new Date().toISOString(),data},null,2);downloadText("recomp-sauvegarde-"+isoToday()+".json",out,"application/json");setMsg("✅ Sauvegarde téléchargée ("+Object.keys(data).length+" éléments).");}catch(e){setMsg("❌ Échec de l'export.");}setBusy(false);};
  const doImport=async file=>{if(!file)return;setBusy(true);try{const text=await file.text();const parsed=JSON.parse(text);const data=parsed.data||parsed;let n=0;for(const k of Object.keys(data)){try{await window.storage.set(k,typeof data[k]==="string"?data[k]:JSON.stringify(data[k]));n++;}catch(e){}}setMsg("✅ "+n+" éléments restaurés. Recharge l'application pour les voir.");}catch(e){setMsg("❌ Fichier invalide.");}setBusy(false);};
  return <Card border={C.border}>
    <div style={{fontSize:13,fontWeight:800,marginBottom:4}}>💾 Sauvegarde des données</div>
    <div style={{fontSize:10.5,color:C.textMut,marginBottom:10}}>Tes données vivent sur cet appareil. Exporte régulièrement pour ne rien perdre (vidage de cache, changement de tél.).</div>
    <div style={{display:"flex",gap:8}}>
      <button onClick={doExport} disabled={busy} style={{flex:1,padding:"10px 0",borderRadius:10,border:`1px solid ${C.amber}55`,background:C.amber+"15",color:C.amber,fontSize:12,fontWeight:700,cursor:"pointer",opacity:busy?.6:1}}>⬇️ Exporter</button>
      <label style={{flex:1,padding:"10px 0",borderRadius:10,border:`1px solid ${C.border}`,background:"transparent",color:C.text,fontSize:12,fontWeight:700,cursor:"pointer",textAlign:"center"}}>⬆️ Importer<input type="file" accept="application/json,.json" style={{display:"none"}} onChange={e=>{doImport(e.target.files&&e.target.files[0]);e.target.value="";}}/></label>
    </div>
    {msg&&<div style={{fontSize:10.5,color:C.textMut,marginTop:8}}>{msg}</div>}
  </Card>;
}

        <div style={{display:"flex",alignItems:"center",gap:9,background:C.surfaceAlt,borderRadius:11,padding:"9px 11px"}}><span style={{fontSize:18}}>💸</span><div><div style={{fontSize:15,fontWeight:800,color:C.budgetLight}}>{dep7>0?dep7+" €":"—"}</div><div style={{fontSize:9,color:C.textDim}}>dépenses</div></div></div>

  </div>;
}
